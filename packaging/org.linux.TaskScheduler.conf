<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the well-known name and run the daemon. -->
  <policy user="root">
    <allow own="org.linux.TaskScheduler"/>
    <allow send_destination="org.linux.TaskScheduler"/>
    <allow receive_sender="org.linux.TaskScheduler"/>
  </policy>

  <!-- Any local user may call the daemon's methods. Phase 2 does NOT use
       polkit; this is the documented trust boundary. Tighten in Phase 3. -->
  <policy context="default">
    <allow send_destination="org.linux.TaskScheduler"
           send_interface="org.linux.TaskScheduler"/>
    <allow send_destination="org.linux.TaskScheduler"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.linux.TaskScheduler"
           send_interface="org.freedesktop.DBus.Peer"/>
    <allow receive_sender="org.linux.TaskScheduler"/>
  </policy>
</busconfig>
